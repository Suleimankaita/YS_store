<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <button onclick="ms()">click</button>
  <script>
    const ms=async()=>{

      const noti=await Notification.requestPermission();
      if(noti!=='granted') return;
      const notification = new Notification('Title', {
        body: 'This is the body of the notification.',
        silent:false,
        data:{hs:"suleiman"}
        // icon: 'https://example.com/icon.png' // Replace with your icon URL
      });
      notification.onclick = function(event) {
        event.preventDefault(); // Prevent the browser from focusing the Notification's tab
        window.open('https://example.com'); // Replace with your desired URL
      };
      console.log("msd")
      setTimeout(() => {
        notification.close(); // Close the notification after 5 seconds
      }, 5000); // 5000 milliseconds = 5 seconds

      
    }
  </script>
</body>
</html>
